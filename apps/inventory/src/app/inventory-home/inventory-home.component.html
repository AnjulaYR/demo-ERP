<section class="page-header">
  <div>
    <p class="eyebrow">Operations</p>
    <h1>Inventory control</h1>
    <p>Track products, warehouses, stock balances, and movements.</p>
  </div>
  <button type="button">Create product</button>
</section>

<section class="crud-card">
  <div class="card-toolbar">
    <strong>Inventory records</strong>
    <input type="search" placeholder="Search inventory" aria-label="Search inventory" />
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Status</th>
        <th>Location</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (record of records; track record.id) {
        <tr>
          <td>{{ record.id }}</td>
          <td>{{ record.name }}</td>
          <td><span class="status">{{ record.status }}</span></td>
          <td>{{ record.owner }}</td>
          <td>
            <button type="button" class="link-button">View</button>
            <button type="button" class="link-button">Edit</button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</section>
