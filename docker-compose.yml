services:
  postgres:
    image: postgres:16-alpine
    container_name: demo-erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-demo_erp}
      POSTGRES_USER: ${POSTGRES_USER:-demo_erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo_erp_password}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - demo_erp_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-demo_erp} -d ${POSTGRES_DB:-demo_erp}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  demo_erp_postgres_data:

