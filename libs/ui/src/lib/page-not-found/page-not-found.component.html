<section class="not-found" aria-labelledby="page-not-found-title">
  <div class="not-found-code" aria-hidden="true">404</div>

  <div class="not-found-panel">
    <p class="eyebrow">Lost route</p>
    <h1 id="page-not-found-title">Page Not Found</h1>
    <p>
      The page you are looking for does not exist or may have moved. Use the navigation
      or return to the ERP dashboard.
    </p>
    <a class="home-link" [routerLink]="homeUrl()">Back to dashboard</a>
  </div>
</section>
